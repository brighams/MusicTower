name: Tauri Release

on:
  push:
    branches: [tauri]
    tags: ['v*']
  workflow_dispatch:

jobs:
  guard:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on the tauri branch
        run: |
          git fetch origin tauri --depth=0
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/tauri; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not reachable from the tauri branch. Releases must be tagged on tauri."
            exit 1
          fi

  build:
    needs: [guard]
    if: ${{ always() && (needs.guard.result == 'success' || needs.guard.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: linux-x86_64
          - os: macos-latest
            artifact: macos-aarch64
          - os: windows-latest
            artifact: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing manifests to version $VERSION"
          python - "$VERSION" <<'PY'
          import json, re, sys, pathlib
          v = sys.argv[1]
          conf = pathlib.Path('src-tauri/tauri.conf.json')
          d = json.loads(conf.read_text())
          d['version'] = v
          conf.write_text(json.dumps(d, indent=2) + '\n')
          cargo = pathlib.Path('src-tauri/Cargo.toml')
          src = cargo.read_text()
          src = re.sub(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{v}"', src, count=1)
          cargo.write_text(src)
          PY

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
