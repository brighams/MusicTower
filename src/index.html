<div id="footer" class="msg">loading…</div>

<script>
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── rating helpers ────────────────────────────────────────────────────────────

const SHOW_PATHS = new URLSearchParams(window.location.search).has('show_paths')

const RATING_HOLD_MS = 380

const POPUP_OPTS = [
  { cls: 'rp-skull', icon: '☠',     value: -1   },
  { cls: 'rp-clear', icon: '☆',     value: 0    },
  { cls: 'rp-star',  icon: '★',     value: 200  },
  { cls: 'rp-star',  icon: '★★',    value: 400  },
  { cls: 'rp-star',  icon: '★★★',   value: 600  },
  { cls: 'rp-star',  icon: '★★★★',  value: 800  },
  { cls: 'rp-star',  icon: '★★★★★', value: 1000 },
]

const rating_icon = (n) => {
  if (n < 0)   return `<span class="rating-skull">☠</span>`
  if (n === 0) return `<span class="rating-empty">☆</span>`
  const stars = n <= 333 ? '★' : n <= 666 ? '★★' : '★★★'
  return `<span class="rating-stars">${stars}</span>`
}

const rating_widget_html = (key, kind, rating) =>
  `<span class="rating-widget" data-key="${esc(key)}" data-kind="${esc(kind)}" data-rating="${rating}"
    onmousedown="ratingMouseDown(event,this)" onmouseup="ratingMouseUp(event,this)"
    ondblclick="ratingDblClick(event,this)">${rating_icon(rating)}</span>`

const applyRating = async (el, val) => {
  el.dataset.rating = val
  el.innerHTML = rating_icon(val)
  await fetch('/api/rating', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({key: el.dataset.key, rating: val, kind: el.dataset.kind})
  }).catch(() => {})
  if (el.dataset.kind === 'track') {
    el.closest('tr')?.classList.toggle('banned-track', val < 0)
  } else {
    el.closest('.album-entry')?.classList.toggle('banned-album', val < 0)
  }
}

let _ratingPopup = null

const closeRatingPopup = () => {
  if (_ratingPopup) { _ratingPopup.remove(); _ratingPopup = null }
  document.removeEventListener('pointerdown', _popupOutside)
  document.removeEventListener('keydown', _popupKey)
}

const _popupOutside = (e) => {
  if (_ratingPopup && !_ratingPopup.contains(e.target)) closeRatingPopup()
}

const _popupKey = (e) => {
  if (e.key === 'Escape') closeRatingPopup()
}

const showRatingPopup = (widget) => {
  closeRatingPopup()
  const cur = parseInt(widget.dataset.rating) || 0
  const popup = document.createElement('div')
  popup.className = 'rating-popup'

  for (const o of POPUP_OPTS) {
    const opt = document.createElement('div')
    const active = o.value === cur ? ' rp-active' : ''
    opt.className = `rp-opt ${o.cls}${active}`
    opt.textContent = o.icon
    opt.dataset.value = o.value
    popup.appendChild(opt)
  }

  popup.addEventListener('click', (e) => {
    const opt = e.target.closest('.rp-opt')
    if (!opt) return
    e.stopPropagation()
    applyRating(widget, parseInt(opt.dataset.value))
    closeRatingPopup()
  })

  const rect = widget.getBoundingClientRect()
  const popupW = POPUP_OPTS.length * 46
  const left = Math.min(rect.left, window.innerWidth - popupW - 8)
  popup.style.left = Math.max(4, left) + 'px'
  popup.style.top  = (rect.bottom + 6) + 'px'
  document.body.appendChild(popup)
  _ratingPopup = popup

  setTimeout(() => {
    document.addEventListener('pointerdown', _popupOutside)
    document.addEventListener('keydown', _popupKey)
  }, 0)
}

const ratingMouseDown = (evt, el) => {
  if (evt.button !== 0) return
  evt.preventDefault(); evt.stopPropagation()
  el._holdTimer = setTimeout(() => { el._holdTimer = null; showRatingPopup(el) }, RATING_HOLD_MS)
}

const ratingMouseUp = (evt, el) => {
  if (el._holdTimer) { clearTimeout(el._holdTimer); el._holdTimer = null }
}

const ratingDblClick = (evt, el) => {
  evt.stopPropagation()
  if (el._holdTimer) { clearTimeout(el._holdTimer); el._holdTimer = null }
  closeRatingPopup()
  const cur = parseInt(el.dataset.rating) || 0
  const inp = document.createElement('input')
  inp.type = 'number'; inp.min = '-1'; inp.max = '1000'
  inp.value = cur; inp.className = 'rating-input'
  el.innerHTML = ''; el.appendChild(inp)
  inp.focus(); inp.select()

  let done = false
  const commit = async () => {
    if (done) return; done = true
    const raw = inp.value.trim()
    const val = raw === '' ? 0 : Math.max(-1, Math.min(1000, parseInt(raw) || 0))
    await applyRating(el, val)
  }
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') inp.blur()
    if (e.key === 'Escape') { done = true; e.stopPropagation(); el.innerHTML = rating_icon(cur) }
  })
  inp.addEventListener('blur', commit)
}

// ── player ────────────────────────────────────────────────────────────────────

const AUDIO = document.getElementById('audio-player')
const player = { albumId: null, tracks: [], urlFn: null, idx: -1 }
let randomMode = false
let ALL_ST_ALBUMS = []
let ALL_DM_ALBUMS = []

AUDIO.onplay  = () => { document.getElementById('np-play').textContent = '⏸'; start_viz() }
AUDIO.onpause = () => { document.getElementById('np-play').textContent = '▶'; stop_viz() }
AUDIO.onended = () => {
  if (randomMode) {
    playRandom()
  } else if (player.idx + 1 < player.tracks.length) {
    playIdx(player.idx + 1)
  }
}

const playIdx = (idx) => {
  player.idx = idx
  AUDIO.src = player.urlFn(player.tracks[idx])
  AUDIO.play()
  refreshNowPlaying()
  refreshHighlight()
  on_track_change()
}

const playFrom = (albumId, fileId) => {
  const reg = TRACK_REG[albumId]
  if (!reg) return
  const filtered = reg.tracks.filter(t => !isTypeOff(albumId, t.media_type) && (t.rating ?? 0) >= 0)
  const idx = filtered.findIndex(t => t.file_id === fileId)
  if (idx < 0) return
  player.albumId = albumId
  player.tracks  = filtered
  player.urlFn   = reg.urlFn
  playIdx(idx)
}

const stopPlayback = () => {
  AUDIO.pause()
  AUDIO.src = ''
  stop_viz()
  refreshHighlight()
  _clear_img?.(document.getElementById('corner-art'))
}

const skipTrack = () => {
  if (randomMode) {
    playRandom()
  } else if (player.idx + 1 < player.tracks.length) {
    playIdx(player.idx + 1)
  }
}

const togglePlayPause = () => {
  if (AUDIO.paused) { AUDIO.play() } else { AUDIO.pause() }
}


const toggleRandom = () => {
  randomMode = !randomMode
  document.getElementById('np-random').classList.toggle('active', randomMode)
}

const toggleNpExpand = () => {
  const body = document.getElementById('np-body')
  const btn  = document.getElementById('np-expand')
  const open = body.style.display === 'none'
  body.style.display = open ? '' : 'none'
  btn.textContent = open ? '▾' : '▸'
}

const playRandom = async () => {
  const pool = [...ALL_ST_ALBUMS, ...ALL_DM_ALBUMS].filter(a => (a.album_rating ?? 0) >= 0)
  if (!pool.length) return
  const album = pool[Math.floor(Math.random() * pool.length)]
  const scanType = ALL_ST_ALBUMS.includes(album) ? 'music' : 'files'
  const prefix = scanType === 'music' ? 'st' : 'dm'
  const albumId = prefix + '_' + encodeURIComponent(album.title).replace(/'/g, '%27')
  const urlFn = t => `/media/${t.file_id}`
  const tracks = await fetch(`/api/album/tracks?title=${encodeURIComponent(album.title)}&scan_type=${scanType}`).then(r => r.json())
  if (!tracks.length) return
  const types = [...new Set(tracks.map(t => t.media_type).filter(Boolean))].sort()
  if (!TRACK_REG[albumId]) {
    TRACK_REG[albumId] = { tracks, urlFn, allTypes: types, title: album.title, scanType,
      capsule_image:         album.capsule_image         || null,
      logo_url:              album.logo_url              || null,
      lc_capsule_url:        album.lc_capsule_url        || null,
      details_capsule_image: album.details_capsule_image || null,
    }
  }
  const filtered = tracks.filter(t => !isTypeOff(albumId, t.media_type) && (t.rating ?? 0) >= 0)
  const queue = filtered.length ? filtered : tracks.filter(t => (t.rating ?? 0) >= 0)
  if (!queue.length) return
  player.albumId = albumId
  player.tracks  = queue
  player.urlFn   = urlFn
  playIdx(Math.floor(Math.random() * queue.length))
}

const playBtnClick = (btn) => {
  if (btn.dataset.queueIdx !== undefined) {
    playIdx(parseInt(btn.dataset.queueIdx))
    return
  }
  const albumId = btn.dataset.albumId
  const fileId  = parseInt(btn.dataset.fileId)
  const reg     = TRACK_REG[albumId]
  if (!reg) return
  const track = reg.tracks.find(t => t.file_id === fileId)
  if (track && (track.rating ?? 0) < 0) {
    AUDIO.src = reg.urlFn(track)
    AUDIO.play()
    document.getElementById('np-filename').textContent = track.file_name
    return
  }
  playFrom(albumId, fileId)
}

  float yn=uv.y/ev;
  float half_w=ew_h*sqrt(max(0.,1.-yn*yn));
  float eye=smoothstep(half_w+.005,half_w-.005,abs(uv.x))*smoothstep(1.05,.95,abs(yn));
  vec2 ec=vec2(uv.x/max(ew_h,.003),uv.y/ev);
  float ir=length(ec);
  vec2 gaze=vec2(sin(u_time*.07)*.06,cos(u_time*.11+1.)*.10);
  vec2 fuv=(ec-gaze)*1.2+vec2(t*.2,t*.55);
  float fv=fbm(fuv+u_bass*.65)*.6+fbm(fuv*1.4-vec2(t*.1,t*.3)+u_mid*.35)*.4;
  float iglow=(1.-smoothstep(0.,.88,ir))*(.25+u_bass*.75+u_beat*.5)+exp(-abs(ir-.68)*14.)*.4;
  vec3 iris=spal(fv*.8+.1)*iglow;
  float ph=max(.015,(0.02+u_bass*.07)*ev);
  float pd=length(vec2(uv.x/max(ew_h*.90,.003),uv.y/ph));
  float pupil=smoothstep(1.1,.80,pd)*eye;
  vec3 pc=spal(.03)*(.3+u_bass*.4);
  vec3 ecol=mix(iris,pc,pupil);
  float cor=exp(-max(0.,ir-.90)*4.)*(.15+u_bass*.85+u_beat*.70);
  vec3 ccol=spal(fv*.5+.05)*cor;
  float atm=fbm(uv*2.+vec2(t*.04,-t*.06));
  vec3 bg=spal(atm*.3+.08)*atm*(.03+u_bass*.05);
  float fw=.095*sqrt(max(0.,1.-yn*yn));
  float ylid=smoothstep(1.04,.93,abs(yn));
  float lid=(smoothstep(fw+.01,fw-.01,abs(uv.x))-eye)*ylid*blink;
  vec3 lc=spal(.12+fbm(uv*5.+t*.12)*.08)*.18;
  vec3 col=bg+ccol+ecol*eye+lc*lid;
  col+=spal(.92)*u_beat*.5*smoothstep(1.4,.6,ir);
  gl_FragColor=vec4(col,u_alpha);
}\`]

const compile=(type,src)=>{const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));return s}
const quad=(()=>{const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);return b})()
const build_prog=src=>{
  const p=gl.createProgram()
  gl.attachShader(p,compile(gl.VERTEX_SHADER,VERT));gl.attachShader(p,compile(gl.FRAGMENT_SHADER,src))
  gl.linkProgram(p);gl.useProgram(p)
  gl.bindBuffer(gl.ARRAY_BUFFER,quad)
  const loc=gl.getAttribLocation(p,'a_pos')
  gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0)
  const U=n=>gl.getUniformLocation(p,n)
  return{p,Ut:U('u_time'),Ub:U('u_bass'),Um:U('u_mid'),Utr:U('u_treble'),Ube:U('u_beat'),
         Ur:U('u_res'),Up:U('u_palette'),Uw:U('u_wave'),Uf:U('u_freq'),Ua:U('u_alpha')}
}
const mk_tex=(w,h,d)=>{const t=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,d);return t}
const dflt_pal=()=>{const d=new Uint8Array(256);
  for(let i=0;i<64;i++){const t=i/63;d[i*4]=(t*180+10)|0;d[i*4+1]=(t*20)|0;d[i*4+2]=(t*230+25)|0;d[i*4+3]=255}
  return d}
const pal_tex =mk_tex(8,8,dflt_pal())
const wave_tex=mk_tex(256,1,new Uint8Array(1024).fill(128))
const freq_tex=mk_tex(128,1,new Uint8Array(512).fill(0))
const up_gray=(tex,w,h,src)=>{
  const d=new Uint8Array(w*h*4)
  for(let i=0;i<w*h;i++){const v=src[i]??128;d[i*4]=d[i*4+1]=d[i*4+2]=v;d[i*4+3]=255}
  gl.bindTexture(gl.TEXTURE_2D,tex)
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,d)
}

const PROGS_A=FRAGS_A.map(build_prog)
const PROGS_B=FRAGS_B.map(build_prog)
let bass=0,mid=0,treble=0,beat=0,viz_time=0
const FADE=1.5
const DURS=[[6,8,12],[2,4,8],[16]]
const ALPHAS=[.55,.45,.38]
const ns=()=>performance.now()/1000
const rnd=(n,x=-1)=>{if(n<=1)return 0;let r;do{r=Math.floor(Math.random()*n)}while(r===x);return r}
const pdur=(d)=>d[Math.floor(Math.random()*d.length)]
const layers=[
  {progs:PROGS_A,cur:rnd(PROGS_A.length),next:-1,fs:0,ts:ns(),dur:pdur([6,8,12])},
  {progs:PROGS_A,cur:rnd(PROGS_A.length),next:-1,fs:0,ts:ns(),dur:pdur([2,4,8])},
  {progs:PROGS_B,cur:rnd(PROGS_B.length),next:-1,fs:0,ts:ns(),dur:pdur([6,8,12])},
]

const draw=(po,alpha)=>{
  const{p,Ut,Ub,Um,Utr,Ube,Ur,Up,Uw,Uf,Ua}=po
  gl.useProgram(p)
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,pal_tex);gl.uniform1i(Up,0)
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,wave_tex);gl.uniform1i(Uw,1)
  gl.activeTexture(gl.TEXTURE2);gl.bindTexture(gl.TEXTURE_2D,freq_tex);gl.uniform1i(Uf,2)
  gl.uniform1f(Ut,viz_time);gl.uniform1f(Ub,bass);gl.uniform1f(Um,mid)
  gl.uniform1f(Utr,treble);gl.uniform1f(Ube,beat)
  gl.uniform2f(Ur,canvas.width,canvas.height)
  gl.uniform1f(Ua,alpha)
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4)
}

window.addEventListener('message',e=>{
  const d=e.data;if(!d?.viz)return
  if(d.bass!==undefined)bass=d.bass
  if(d.mid!==undefined)mid=d.mid
  if(d.treble!==undefined)treble=d.treble
  if(d.beat!==undefined)beat=d.beat
  if(d.time!==undefined)viz_time=d.time
  if(d.wave)up_gray(wave_tex,256,1,d.wave)
  if(d.freq)up_gray(freq_tex,128,1,d.freq)
  if(d.palette){
    const w=d.pal_w||8,h=d.pal_h||8
    gl.bindTexture(gl.TEXTURE_2D,pal_tex)
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array(d.palette))
  }
  if(d.reset){
    const t=ns()
    for(const l of layers){l.next=rnd(l.progs.length,l.cur);l.fs=t}
  }
})

const render=()=>{
  requestAnimationFrame(render)
  gl.clear(gl.COLOR_BUFFER_BIT)
  const t=ns()
  for(let i=0;i<3;i++){
    const l=layers[i],ba=ALPHAS[i]
    if(l.next===-1&&t-l.ts>=l.dur){l.next=rnd(l.progs.length,l.cur);l.fs=t}
    if(l.next!==-1){
      const ft=Math.min(1,(t-l.fs)/FADE)
      draw(l.progs[l.cur],ba*(1-ft))
      draw(l.progs[l.next],ba*ft)
      if(ft>=1){l.cur=l.next;l.next=-1;l.ts=t;l.dur=pdur(DURS[i])}
    }else{
      draw(l.progs[l.cur],ba)
    }
  }
}
render()
<\/script></body></html>`

const VIZ_IFRAME = document.getElementById('visualizer')
VIZ_IFRAME.src = URL.createObjectURL(new Blob([VIZ_HTML], { type: 'text/html' }))

const BODY_BG_VIZ     = 'rgba(14, 8, 32, 0.65)'
const BODY_BG_DEFAULT = 'linear-gradient(160deg, #0e0820 0%, #160d30 50%, #0c0618 100%)'
const FREQ_BINS = 128
const WAVE_BINS = 256
const freq_data = new Uint8Array(FREQ_BINS)
const wave_data = new Uint8Array(WAVE_BINS)
let audio_ctx = null
let analyser   = null
let viz_raf    = null
let viz_start  = null
let beat          = 0
let prev_bass     = 0
let last_beat_t   = 0
const ensure_audio_ctx = () => {
  if (audio_ctx) return
  audio_ctx = new AudioContext()
  const source = audio_ctx.createMediaElementSource(AUDIO)
  analyser = audio_ctx.createAnalyser()
  analyser.fftSize = WAVE_BINS
  analyser.smoothingTimeConstant = 0.82
  source.connect(analyser)
  analyser.connect(audio_ctx.destination)
}

const freq_avg = (lo, hi) => {
  let s = 0
  for (let i = lo; i < hi; i++) s += freq_data[i]
  return s / ((hi - lo) * 255)
}

let _colors_pool = null

const load_colors = async () => {
  if (_colors_pool) return _colors_pool
  const { colors } = await import('/colors.js')
  _colors_pool = colors.flatMap(hex_str => {
    const c = hex_str.replace('#', '')
    let r, g, b, a
    if (c.length === 8) {
      a = parseInt(c.slice(0, 2), 16)
      r = parseInt(c.slice(2, 4), 16)
      g = parseInt(c.slice(4, 6), 16)
      b = parseInt(c.slice(6, 8), 16)
    } else if (c.length === 6) {
      r = parseInt(c.slice(0, 2), 16)
      g = parseInt(c.slice(2, 4), 16)
      b = parseInt(c.slice(4, 6), 16)
      a = 255
    } else {
      return []
    }
    if (isNaN(r) || isNaN(g) || isNaN(b)) return []
    if (a < 0xaa) return []
    if (Math.max(r, g, b) < 55) return []
    if (Math.max(r, g, b) - Math.min(r, g, b) < 30) return []
    return [[r, g, b]]
  })
  return _colors_pool
}

const gen_palette = (pool) => {
  const PAL_W = 64
  const n = 5 + Math.floor(Math.random() * 6)
  const anchors = Array.from({ length: n }, () => pool[Math.floor(Math.random() * pool.length)])
  const d = new Uint8Array(PAL_W * 4)
  for (let i = 0; i < PAL_W; i++) {
    const t  = (i / PAL_W) * n
    const ia = Math.floor(t) % n
    const ib = (ia + 1) % n
    const f  = t - Math.floor(t)
    d[i*4]   = anchors[ia][0] * (1 - f) + anchors[ib][0] * f | 0
    d[i*4+1] = anchors[ia][1] * (1 - f) + anchors[ib][1] * f | 0
    d[i*4+2] = anchors[ia][2] * (1 - f) + anchors[ib][2] * f | 0
    d[i*4+3] = 255
  }
  return { data: Array.from(d), w: PAL_W, h: 1 }
}

const send_palette = async () => {
  const pool = await load_colors()
  const p = gen_palette(pool)
  VIZ_IFRAME.contentWindow?.postMessage({ viz: true, palette: p.data, pal_w: p.w, pal_h: p.h }, '*')
}

const on_track_change = () => {
  VIZ_IFRAME.contentWindow?.postMessage({ viz: true, reset: true }, '*')
  send_palette()
  const reg = TRACK_REG[player.albumId]
  const urls   = [reg?.logo_url, reg?.lc_capsule_url, reg?.details_capsule_image, reg?.capsule_image]
  const scales = [0.3, 1.0, 1.0, 1.0]
  _coalesce_img?.(document.getElementById('corner-art'), urls, scales)
}

const start_viz = () => {
  ensure_audio_ctx()
  if (audio_ctx.state === 'suspended') audio_ctx.resume()
  if (!viz_start) viz_start = performance.now()
  if (!viz_hidden) VIZ_IFRAME.style.opacity = '1'
  document.body.style.background = BODY_BG_VIZ
  send_palette()
  if (viz_raf) return
  let last_palette_t = 0
  const PALETTE_INTERVAL = 25
  const tick = () => {
    viz_raf = requestAnimationFrame(tick)
    analyser.getByteFrequencyData(freq_data)
    analyser.getByteTimeDomainData(wave_data)
    const t        = (performance.now() - viz_start) / 1000
    const raw_bass = freq_avg(0, 8)
    const raw_mid  = freq_avg(8, 48)
    const raw_treble = freq_avg(48, 128)
    if (raw_bass > prev_bass * 1.35 && raw_bass > 0.15 && t - last_beat_t > 0.1) {
      beat = 1.0
      last_beat_t = t
    }
    if (t - last_palette_t >= PALETTE_INTERVAL) {
      last_palette_t = t
      send_palette()
    }
    beat     *= 0.88
    prev_bass = prev_bass * 0.8 + raw_bass * 0.2
    VIZ_IFRAME.contentWindow?.postMessage({
      viz: true,
      bass:   raw_bass,
      mid:    raw_mid,
      treble: raw_treble,
      beat,
      wave:   Array.from(wave_data),
      freq:   Array.from(freq_data),
      time:   t,
    }, '*')
  }
  viz_raf = requestAnimationFrame(tick)
}

const stop_viz = () => {
  if (viz_raf) { cancelAnimationFrame(viz_raf); viz_raf = null }
  beat = 0; prev_bass = 0
  VIZ_IFRAME.style.opacity = '0'
  document.body.style.background = BODY_BG_DEFAULT
}

let viz_hidden = false
const toggle_viz = () => {
  viz_hidden = !viz_hidden

}

let TYPE_ORDER = []  // lowercase, config priority order

const TRACK_REG    = {}  // albumId -> { tracks, urlFn, allTypes, title, scanType, ...image fields }
const TYPE_OFF     = {}  // albumId -> Set<type>
const ALBUM_IMAGES = {}  // albumId -> { capsule_image, logo_url, lc_capsule_url, details_capsule_image }

let _coalesce_img = null
let _clear_img    = null

const isTypeOff = (albumId, type) => !!(TYPE_OFF[albumId] && TYPE_OFF[albumId].has(type))

const typeToggleClick = (evt, albumId, type, btn) => {
  evt.stopPropagation()
  if (!TYPE_OFF[albumId]) TYPE_OFF[albumId] = new Set()
  if (TYPE_OFF[albumId].has(type)) {
    TYPE_OFF[albumId].delete(type)
    btn.className = 'type-toggle'
  } else {
    TYPE_OFF[albumId].add(type)
    btn.className = 'type-toggle off'

    player.tracks = TRACK_REG[albumId].tracks.filter(t => !isTypeOff(albumId, t.media_type) && (t.rating ?? 0) >= 0)
    player.idx = cur ? player.tracks.findIndex(t => t.file_id === cur.file_id) : -1
    refreshNowPlaying()
  }
}

const floppyClick = (evt, btn) => {
  evt.stopPropagation()
  const albumId = btn.dataset.albumId
  const reg = TRACK_REG[albumId]
  if (!reg) return
  const active = reg.tracks.filter(t => !isTypeOff(albumId, t.media_type))
  if (!active.length) return
  const activeTypes = [...new Set(active.map(t => t.media_type))].sort()
  const typeSuffix = activeTypes.length === reg.allTypes.length ? 'all' : activeTypes.join('-')
  const tracks = active.map(t =>
    `    <track>\n      <location>file://${t.full_path.replace(/ /g, '%20')}</location>\n      <title>${esc(t.file_name)}</title>\n    </track>`
  ).join('\n')

  const a = document.createElement('a')

const tracksTable = (tracks, urlFn, albumId, fromQueue) => {
  if (!tracks.length) return '<span class="msg">no tracks found</span>'
  const rows = tracks.map((t, i) => {
    const url     = urlFn(t)
    const kb      = t.size ? (t.size / 1024).toFixed(0) + ' KB' : ''
    const plays   = t.play_count > 0 ? t.play_count : ''
    const rating  = t.rating ?? 0
    const hidden  = !fromQueue && albumId && isTypeOff(albumId, t.media_type) ? ' style="display:none"' : ''
    const btnData = fromQueue
      ? `data-queue-idx="${i}"`
      : `data-album-id="${esc(albumId)}" data-file-id="${t.file_id}"`
    const bannedCls = rating < 0 ? ' banned-track' : ''
    const ratingCol = fromQueue ? '' : `<td>${rating_widget_html(t.join_key || '', 'track', rating)}</td>`
    const sizeCol   = fromQueue ? '' : `<td class="dim">${esc(kb)}</td>`
    const typeCol   = fromQueue ? '' : `<td><span class="badge">${esc(t.media_type)}</span></td>`
    const classCol  = fromQueue ? '' : `<td><span class="badge">${esc(t.media_class || '')}</span>${t.lang ? `&thinsp;<span class="badge">${esc(t.lang)}</span>` : ''}</td>`
    const pathCol   = SHOW_PATHS ? `<td class="dim">${esc(t.full_path)}</td>` : ''
    return `<tr data-type="${esc(t.media_type)}" data-url="${esc(url)}"${hidden} class="${bannedCls}">
      <td class="play-col"><button class="play-btn" ${btnData} onclick="playBtnClick(this)">▶</button></td>
      <td>${esc(t.file_name)}</td>
      <td class="play-count">${plays}</td>
      ${sizeCol}${ratingCol}${typeCol}${classCol}${pathCol}
    </tr>`
  }).join('')
  const ratingTh = fromQueue ? '' : '<th></th>'
  const sizeTh   = fromQueue ? '' : '<th>size</th>'
  const typeTh   = fromQueue ? '' : '<th>type</th>'
  const classTh  = fromQueue ? '' : '<th>class</th>'
  const pathTh   = SHOW_PATHS ? '<th>path</th>' : ''
  return `<table><tr><th></th><th>file</th><th>plays</th>${sizeTh}${ratingTh}${typeTh}${classTh}${pathTh}</tr>${rows}</table>`
}

async function load() {

  ALL_DM_ALBUMS = dmList

  const byTypeMap = Object.fromEntries((sum.by_type || []).map(r => [r.media_type.toUpperCase(), r.count]))

const initTypeDefaults = (albumId, types) => {
  if (types.length <= 1) return
  if (!TYPE_OFF[albumId]) TYPE_OFF[albumId] = new Set()
  const priority = TYPE_ORDER.map(t => t.toUpperCase())
  const bestType = priority.find(t => types.includes(t)) || types[0]
  for (const t of types) {
    if (t !== bestType) TYPE_OFF[albumId].add(t)
  }
}

function buildAlbumEntry(a, scanType, prefix) {
  const types = (a.types || '').split(',').filter(Boolean).sort()
  const id    = prefix + '_' + encodeURIComponent(a.title).replace(/'/g, '%27')

  ALBUM_IMAGES[id] = {
    capsule_image:         a.capsule_image         || null,
    logo_url:              a.logo_url              || null,
    lc_capsule_url:        a.lc_capsule_url        || null,
    details_capsule_image: a.details_capsule_image || null,
  }
  initTypeDefaults(id, types)

  const div = document.createElement('div')
  div.className    = 'album-entry'
  div.dataset.name = (a.title || '').toLowerCase()

  const badgesHtml = types.map(t => {
    const off = isTypeOff(id, t) ? ' off' : ''
    return `<button class="type-toggle${off}" onclick="typeToggleClick(event,'${id}','${esc(t)}',this)">${esc(t)}</button>`
  }).join('')

  const floppyHtml = `<button class="floppy-btn" id="fl-${esc(id)}" data-album-id="${esc(id)}" onclick="floppyClick(event,this)" title="Save VLC playlist">💾</button>`

  const albumKey    = a.album_key || ''
  const albumRating = a.album_rating ?? 0
  const plays       = a.album_play_count > 0 ? `<span class="album-plays">${a.album_play_count.toLocaleString()} plays</span>` : ''

  div.innerHTML = `
    <div class="row" data-title="${esc(a.title)}" data-scan-type="${esc(scanType)}" data-id="${esc(id)}" onclick="toggleAlbum(this)">
      <span class="row-name">${esc(a.title)}</span>
      <div class="badges">${badgesHtml}</div>
      ${plays}
      <span class="row-meta">${(a.track_count||0).toLocaleString()} files</span>
      ${rating_widget_html(albumKey, 'album', albumRating)}
      ${floppyHtml}
    </div>
    <div class="tracks-panel" id="tp-${esc(id)}"><span class="msg">loading…</span></div>`

  if (albumRating < 0) div.classList.add('banned-album')
  return div
}

function buildAlbums(albums, containerId, scanType, prefix) {
  const el = document.getElementById(containerId)
  if (!albums.length) { el.innerHTML = '<span class="msg">none found</span>'; return }
  el.innerHTML = ''

  const normal = albums
    .filter(a => (a.album_rating ?? 0) >= 0)
    .sort((a, b) => {
      const rd = (b.album_rating ?? 0) - (a.album_rating ?? 0)
      return rd !== 0 ? rd : (a.title || '').localeCompare(b.title || '')
    })
  const banned = albums
    .filter(a => (a.album_rating ?? 0) < 0)
    .sort((a, b) => (a.title || '').localeCompare(b.title || ''))

  for (const a of normal) el.appendChild(buildAlbumEntry(a, scanType, prefix))

  if (banned.length) {
    const hdr = document.createElement('div')
    hdr.className = 'banned-section-hdr'
    hdr.textContent = '── banned · not in rotation ──'
    el.appendChild(hdr)
    for (const a of banned) el.appendChild(buildAlbumEntry(a, scanType, prefix))
  }
}

async function toggleAlbum(row) {
  const title    = row.dataset.title
  const scanType = row.dataset.scanType
  const id       = row.dataset.id
  const panel    = document.getElementById('tp-' + id)
  const open     = panel.classList.toggle('open')
  if (!open || panel.dataset.loaded) return
  panel.dataset.loaded = '1'

  const urlFn  = t => `/media/${t.file_id}`
  const base   = `/api/album/tracks?title=${encodeURIComponent(title)}&scan_type=${scanType}`
  const tracks = await fetch(base).then(r => r.json())
  const types  = [...new Set(tracks.map(t => t.media_type).filter(Boolean))].sort()

  const imgs = ALBUM_IMAGES[id] || {}
  TRACK_REG[id] = { tracks, urlFn, allTypes: types, title, scanType,
    capsule_image:         imgs.capsule_image         || null,
    logo_url:              imgs.logo_url              || null,
    lc_capsule_url:        imgs.lc_capsule_url        || null,
    details_capsule_image: imgs.details_capsule_image || null,
  }

  document.getElementById('fl-' + id)?.classList.add('loaded')
  panel.innerHTML = tracksTable(tracks, urlFn, id, false)
  refreshHighlight()
}

function filterAll(q) {
  const term = q.toLowerCase()
  for (const div of document.querySelectorAll('.album-entry')) {
    div.style.display = !term || div.dataset.name.includes(term) ? '' : 'none'
  }
}

load().then(() => {
  toggleRandom()
  playRandom()
}).catch(e => {
  document.getElementById('footer').textContent = 'Error: ' + e
})
</script>
