<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Starkeeper Media</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 14px/1.5 monospace; background: #111; color: #ccc; padding: 24px; }
h1 { color: #e8c040; margin-bottom: 12px; font-size: 1.4em; letter-spacing: 1px; }
#summary { margin-bottom: 20px; color: #7a9; border-left: 3px solid #2a5; padding-left: 12px; }
#summary strong { color: #afa; }

#now-playing {
  display: none; margin-bottom: 20px;
  background: #161622; border-left: 3px solid #e8c040; padding: 10px 14px;
}
#np-label { color: #e8c040; font-size: 0.8em; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
#np-filename { color: #fff; margin-bottom: 8px; }
#np-tracks { max-height: 220px; overflow-y: auto; }

.filter-row { margin-bottom: 20px; }
.filter-row input {
  background: #1e1e1e; border: 1px solid #444; color: #ccc;
  padding: 4px 10px; width: 300px; font: inherit; border-radius: 3px;
}
.filter-row input:focus { outline: none; border-color: #e8c040; }

h2 { font-size: 1em; color: #888; letter-spacing: 1px; text-transform: uppercase;
     border-bottom: 1px solid #2a2a2a; padding-bottom: 6px; margin-bottom: 4px;
     cursor: pointer; user-select: none; }
h2:hover { color: #aaa; }
h2 small { color: #555; text-transform: none; letter-spacing: 0; margin-left: 8px; font-weight: normal; }
.section-arrow { margin-right: 6px; }
.section { margin-bottom: 32px; }
.section-body.collapsed { display: none; }

.row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 4px; cursor: pointer; gap: 16px; border-bottom: 1px solid #1c1c1c;
}
.row:hover { background: #181818; }
.row-name { color: #7ab4e8; flex: 1; }
.row-meta { color: #555; font-size: 0.85em; flex-shrink: 0; }
.floppy-btn {
  display: none; background: none; border: none; color: #555;
  cursor: pointer; font-size: 1.1em; padding: 0 2px; flex-shrink: 0; line-height: 1;
}
.floppy-btn.loaded { display: block; }
.row:hover .floppy-btn.loaded { color: #afa; }
.badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge {
  font-size: 0.72em; padding: 1px 5px; border-radius: 2px;
  background: #202020; color: #777; letter-spacing: 0.5px;
}
.type-toggle {
  font-size: 0.72em; padding: 1px 5px; border-radius: 2px; letter-spacing: 0.5px;
  cursor: pointer; border: 1px solid #3a5a3a; background: #1e2e1e; color: #afa;
  user-select: none; font-family: inherit;
}
.type-toggle.off {
  background: #1a1a1a; color: #444; border-color: #222; text-decoration: line-through;
}

.tracks-panel { display: none; padding: 4px 8px 12px 20px; }
.tracks-panel.open { display: block; }
table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
th { color: #555; text-align: left; padding: 3px 8px; border-bottom: 1px solid #1e1e1e; }
td { padding: 2px 8px; }
tr:hover td { background: #181818; }
td a { color: #7ab4e8; text-decoration: none; }
td a:hover { color: #e8c040; }
.dim { color: #555; }
.msg { color: #555; font-style: italic; padding: 6px 0; display: block; }

.play-col { width: 20px; padding: 2px 2px 2px 4px !important; }
.play-btn {
  visibility: hidden; background: none; border: none;
  color: #7ab4e8; cursor: pointer; font-size: 0.85em; padding: 0; line-height: 1;
}
tr:hover .play-btn { visibility: visible; }
tr.playing .play-btn { visibility: visible; color: #e8c040; }
tr.playing td { background: #1a1a22; }
</style>
</head>
<body>
<h1>⭐ STARKEEPER MEDIA</h1>
<div id="summary" class="msg">loading…</div>

<audio id="audio-player"></audio>

<div id="now-playing">
  <div id="np-label">Now Playing</div>
  <div id="np-filename">—</div>
  <div id="np-tracks"></div>
</div>

<div class="filter-row">
  <input id="search" type="text" placeholder="filter by name…" oninput="filterAll(this.value)">
</div>

<div class="section">
  <h2 onclick="toggleSection(this)"><span class="section-arrow">▾</span>Sound Tracks <small id="st-count"></small></h2>
  <div id="soundtracks" class="section-body"><span class="msg">loading…</span></div>
</div>

<div class="section">
  <h2 onclick="toggleSection(this)"><span class="section-arrow">▾</span>Discovered Media <small id="dm-count"></small></h2>
  <div id="media" class="section-body"><span class="msg">loading…</span></div>
</div>

<script>
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── player ────────────────────────────────────────────────────────────────────

const AUDIO = document.getElementById('audio-player')
const player = { albumId: null, tracks: [], urlFn: null, idx: -1 }

AUDIO.onended = () => {
  if (player.idx + 1 < player.tracks.length) playIdx(player.idx + 1)
}

const playIdx = (idx) => {
  player.idx = idx
  AUDIO.src = player.urlFn(player.tracks[idx])
  AUDIO.play()
  refreshNowPlaying()
  refreshHighlight()
}

const playFrom = (albumId, fileId) => {
  const reg = TRACK_REG[albumId]
  if (!reg) return
  const filtered = reg.tracks.filter(t => !isTypeOff(albumId, t.media_type))
  const idx = filtered.findIndex(t => t.file_id === fileId)
  if (idx < 0) return
  player.albumId = albumId
  player.tracks  = filtered
  player.urlFn   = reg.urlFn
  playIdx(idx)
}

const playBtnClick = (btn) => {
  if (btn.dataset.queueIdx !== undefined) {
    playIdx(parseInt(btn.dataset.queueIdx))
  } else {
    playFrom(btn.dataset.albumId, parseInt(btn.dataset.fileId))
  }
}

// ── section collapse ──────────────────────────────────────────────────────────

const toggleSection = (h2) => {
  const body = h2.nextElementSibling
  const collapsed = body.classList.toggle('collapsed')
  h2.querySelector('.section-arrow').textContent = collapsed ? '▸' : '▾'
}

// ── track registry & type filters ────────────────────────────────────────────

let TYPE_ORDER = []  // lowercase, config priority order

const TRACK_REG = {}  // albumId -> { tracks, urlFn, allTypes, title, scanType }
const TYPE_OFF  = {}  // albumId -> Set<type>

const isTypeOff = (albumId, type) => !!(TYPE_OFF[albumId] && TYPE_OFF[albumId].has(type))

const typeToggleClick = (evt, albumId, type, btn) => {
  evt.stopPropagation()
  if (!TYPE_OFF[albumId]) TYPE_OFF[albumId] = new Set()
  if (TYPE_OFF[albumId].has(type)) {
    TYPE_OFF[albumId].delete(type)
    btn.className = 'type-toggle'
  } else {
    TYPE_OFF[albumId].add(type)
    btn.className = 'type-toggle off'
  }
  filterTypeRows(albumId)
  if (player.albumId === albumId && TRACK_REG[albumId]) {
    const cur = player.tracks[player.idx]
    player.tracks = TRACK_REG[albumId].tracks.filter(t => !isTypeOff(albumId, t.media_type))
    player.idx = cur ? player.tracks.findIndex(t => t.file_id === cur.file_id) : -1
    refreshNowPlaying()
  }
}

const floppyClick = (evt, btn) => {
  evt.stopPropagation()
  const albumId = btn.dataset.albumId
  const reg = TRACK_REG[albumId]
  if (!reg) return
  const active = reg.tracks.filter(t => !isTypeOff(albumId, t.media_type))
  if (!active.length) return
  const activeTypes = [...new Set(active.map(t => t.media_type))].sort()
  const typeSuffix = activeTypes.length === reg.allTypes.length ? 'all' : activeTypes.join('-')
  const tracks = active.map(t =>
    `    <track>\n      <location>file://${t.full_path.replace(/ /g, '%20')}</location>\n      <title>${esc(t.file_name)}</title>\n    </track>`
  ).join('\n')
  const xspf = `<?xml version="1.0" encoding="UTF-8"?>\n<playlist version="1" xmlns="http://xspf.org/ns/0/">\n  <trackList>\n${tracks}\n  </trackList>\n</playlist>`
  const a = document.createElement('a')
  a.href = URL.createObjectURL(new Blob([xspf], { type: 'application/xspf+xml' }))
  a.download = `${reg.title}-${typeSuffix}-vlc-playlist.xspf`
  a.click()
}

const filterTypeRows = (albumId) => {
  const panel = document.getElementById('tp-' + albumId)
  if (!panel) return
  for (const tr of panel.querySelectorAll('tr[data-type]')) {
    tr.style.display = isTypeOff(albumId, tr.dataset.type) ? 'none' : ''
  }
}

// ── now playing bar ───────────────────────────────────────────────────────────

const refreshNowPlaying = () => {
  const bar = document.getElementById('now-playing')
  if (player.idx < 0 || !player.tracks.length) { bar.style.display = 'none'; return }
  bar.style.display = 'block'
  document.getElementById('np-filename').textContent = player.tracks[player.idx].file_name
  document.getElementById('np-tracks').innerHTML = tracksTable(player.tracks, player.urlFn, null, true)
  refreshHighlight()
}

const refreshHighlight = () => {
  const curUrl = player.idx >= 0 && player.urlFn ? player.urlFn(player.tracks[player.idx]) : null
  for (const tr of document.querySelectorAll('tr[data-url]')) {
    tr.classList.toggle('playing', tr.dataset.url === curUrl)
  }
}

// ── track table ───────────────────────────────────────────────────────────────

const tracksTable = (tracks, urlFn, albumId, fromQueue) => {
  if (!tracks.length) return '<span class="msg">no tracks found</span>'
  const rows = tracks.map((t, i) => {
    const url    = urlFn(t)
    const kb     = t.size ? (t.size / 1024).toFixed(0) + ' KB' : ''
    const hidden = !fromQueue && albumId && isTypeOff(albumId, t.media_type) ? ' style="display:none"' : ''
    const btnData = fromQueue
      ? `data-queue-idx="${i}"`
      : `data-album-id="${esc(albumId)}" data-file-id="${t.file_id}"`
    return `<tr data-type="${esc(t.media_type)}" data-url="${esc(url)}"${hidden}>
      <td class="play-col"><button class="play-btn" ${btnData} onclick="playBtnClick(this)">▶</button></td>
      <td>${esc(t.file_name)}</td>
      <td><span class="badge">${esc(t.media_type)}</span></td>
      <td class="dim">${esc(kb)}</td>
      <td class="dim">${esc(t.full_path)}</td>
    </tr>`
  }).join('')
  return `<table><tr><th></th><th>file</th><th>type</th><th>size</th><th>path</th></tr>${rows}</table>`
}

// ── page build ────────────────────────────────────────────────────────────────

async function load() {
  const [sumRes, stRes, dmRes] = await Promise.all([
    fetch('/api/summary'),
    fetch('/api/albums?scan_type=music'),
    fetch('/api/albums?scan_type=files'),
  ])
  const sum    = await sumRes.json()
  const stList = await stRes.json()
  const dmList = await dmRes.json()

  TYPE_ORDER = (sum.media_type_order || [])

  const byTypeMap = Object.fromEntries((sum.by_type || []).map(r => [r.media_type.toUpperCase(), r.count]))
  const orderedKeys = TYPE_ORDER.map(t => t.toUpperCase()).filter(t => byTypeMap[t])
  const extraKeys = Object.keys(byTypeMap).filter(t => !orderedKeys.includes(t))
  const parts = [...orderedKeys, ...extraKeys].map(t =>
    `<strong>${byTypeMap[t].toLocaleString()}</strong>&thinsp;${t}`
  )
  document.getElementById('summary').innerHTML =
    `<strong>${sum.total.toLocaleString()}</strong> files &nbsp;·&nbsp; ` + parts.join(' &nbsp;·&nbsp; ')
    + ` &nbsp;|&nbsp; <strong>${(sum.soundtracks||0).toLocaleString()}</strong> sound tracks`
    + ` &nbsp;·&nbsp; <strong>${(sum.discovered||0).toLocaleString()}</strong> media collections`

  document.getElementById('st-count').textContent = `${stList.length.toLocaleString()} titles`
  document.getElementById('dm-count').textContent = `${dmList.length.toLocaleString()} collections`

  buildAlbums(stList, 'soundtracks', 'music', 'st')
  buildAlbums(dmList, 'media', 'files', 'dm')
}

const initTypeDefaults = (albumId, types) => {
  if (types.length <= 1) return
  if (!TYPE_OFF[albumId]) TYPE_OFF[albumId] = new Set()
  const priority = TYPE_ORDER.map(t => t.toUpperCase())
  const bestType = priority.find(t => types.includes(t)) || types[0]
  for (const t of types) {
    if (t !== bestType) TYPE_OFF[albumId].add(t)
  }
}

function buildAlbums(albums, containerId, scanType, prefix) {
  const el = document.getElementById(containerId)
  if (!albums.length) { el.innerHTML = '<span class="msg">none found</span>'; return }
  el.innerHTML = ''
  for (const a of albums) {
    const types = (a.types || '').split(',').filter(Boolean).sort()
    const id    = prefix + '_' + encodeURIComponent(a.title).replace(/'/g, '%27')

    initTypeDefaults(id, types)

    const div   = document.createElement('div')
    div.className    = 'album-entry'
    div.dataset.name = (a.title || '').toLowerCase()

    const badgesHtml = types.map(t => {
      const off = isTypeOff(id, t) ? ' off' : ''
      return `<button class="type-toggle${off}" onclick="typeToggleClick(event,'${id}','${esc(t)}',this)">${esc(t)}</button>`
    }).join('')

    const floppyHtml = `<button class="floppy-btn" id="fl-${esc(id)}" data-album-id="${esc(id)}" onclick="floppyClick(event,this)" title="Save VLC playlist">💾</button>`

    div.innerHTML = `
      <div class="row" data-title="${esc(a.title)}" data-scan-type="${esc(scanType)}" data-id="${esc(id)}" onclick="toggleAlbum(this)">
        <span class="row-name">${esc(a.title)}</span>
        <div class="badges">${badgesHtml}</div>
        <span class="row-meta">${(a.track_count||0).toLocaleString()} files</span>
        ${floppyHtml}
      </div>
      <div class="tracks-panel" id="tp-${esc(id)}"><span class="msg">loading…</span></div>`
    el.appendChild(div)
  }
}

async function toggleAlbum(row) {
  const title    = row.dataset.title
  const scanType = row.dataset.scanType
  const id       = row.dataset.id
  const panel    = document.getElementById('tp-' + id)
  const open     = panel.classList.toggle('open')
  if (!open || panel.dataset.loaded) return
  panel.dataset.loaded = '1'

  const urlFn  = t => `/media/${t.file_id}`
  const base   = `/api/album/tracks?title=${encodeURIComponent(title)}&scan_type=${scanType}`
  const tracks = await fetch(base).then(r => r.json())
  const types  = [...new Set(tracks.map(t => t.media_type).filter(Boolean))].sort()

  TRACK_REG[id] = { tracks, urlFn, allTypes: types, title, scanType }

  document.getElementById('fl-' + id)?.classList.add('loaded')
  panel.innerHTML = tracksTable(tracks, urlFn, id, false)
  refreshHighlight()
}

function filterAll(q) {
  const term = q.toLowerCase()
  for (const div of document.querySelectorAll('.album-entry')) {
    div.style.display = !term || div.dataset.name.includes(term) ? '' : 'none'
  }
}

load().catch(e => {
  document.getElementById('summary').textContent = 'Error: ' + e
})
</script>
</body>
</html>
