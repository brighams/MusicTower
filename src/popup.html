<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Starkeeper — Now Playing</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font: 13px/1.4 monospace; color: #d8c8f0;
  background: linear-gradient(160deg, #1a0035 0%, #2e0055 55%, #180030 100%);
  padding: 10px 14px; display: flex; flex-direction: column; gap: 8px;
  user-select: none;
}
#controls { display: flex; align-items: center; gap: 5px; }
.btn {
  background: rgba(180,0,255,0.08); border: 1px solid #6a28a0; color: #b080d8;
  cursor: pointer; font-size: 0.88em; padding: 2px 8px; border-radius: 3px;
  font-family: inherit; line-height: 1.7; flex-shrink: 0;
  transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
}
.btn:hover { border-color: #df60ff; color: #f0c0ff; box-shadow: 0 0 8px rgba(200,60,255,0.4); }
.btn.active { background: rgba(200,50,255,0.18); border-color: #e060f8; color: #f080ff;
  box-shadow: 0 0 12px rgba(220,60,255,0.5); }
#btn-stop:hover { border-color: #f86090; color: #ff80a8; box-shadow: 0 0 8px rgba(255,60,100,0.35); }
#vol { width: 80px; accent-color: #c060f0; cursor: pointer; flex-shrink: 0; }
#track-info { flex: 1; min-width: 0; padding-left: 8px; border-left: 1px solid #4a1070; }
#track-name {
  color: #f0d8ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-size: 0.92em;
}
#album-name {
  color: #7848b8; font-size: 0.78em; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; margin-top: 1px;
}
#disconnected {
  display: none; color: #5a2880; font-style: italic;
  text-align: center; padding: 12px 0;
}
</style>
</head>
<body>
<div id="controls">
  <button class="btn" id="btn-play"   onclick="cmd('togglePlayPause')">▶</button>
  <button class="btn" id="btn-stop"   onclick="cmd('stopPlayback')">■</button>
  <button class="btn" id="btn-skip"   onclick="cmd('skipTrack')">⏭</button>
  <button class="btn" id="btn-random" onclick="cmd('toggleRandom')">🎲</button>
  <input id="vol" type="range" min="0" max="1" step="0.01" value="1"
         oninput="setVol(this.value)">
  <div id="track-info">
    <div id="track-name">—</div>
    <div id="album-name"></div>
  </div>
</div>
<div id="disconnected">— main window closed —</div>

<script>
const cmd = (fn) => { try { window.opener[fn]() } catch(e) {} }
const setVol = (v) => { try { window.opener.AUDIO.volume = parseFloat(v) } catch(e) {} }

const update = () => {
  if (!window.opener || window.opener.closed) {
    document.getElementById('controls').style.display = 'none'
    document.getElementById('disconnected').style.display = 'block'
    return
  }
  try {
    const p  = window.opener.player
    const a  = window.opener.AUDIO
    const rm = window.opener.randomMode
    const t  = p.tracks[p.idx]
    document.getElementById('track-name').textContent = t ? t.file_name : '—'
    document.getElementById('album-name').textContent = t ? (t.title || '') : ''
    document.getElementById('btn-play').textContent = a.paused ? '▶' : '⏸'
    document.getElementById('btn-random').classList.toggle('active', !!rm)
    const vol = document.getElementById('vol')
    if (!vol.matches(':active')) vol.value = a.volume
  } catch(e) {}
}

setInterval(update, 350)
update()
</script>
</body>
</html>
